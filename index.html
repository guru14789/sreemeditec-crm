<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Sree Meditec CRM</title>
   
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
      body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: transparent; border-radius: 10px; }
      *:hover::-webkit-scrollbar-thumb { background-color: #cbd5e1; }
      ::-webkit-scrollbar-thumb:hover { background-color: #059669 !important; }
      
      @media print {
        .no-print { display: none !important; }
      }

      .dark ::-webkit-scrollbar-thumb { background-color: #334155; }
      .dark *:hover::-webkit-scrollbar-thumb { background-color: #475569; }
    </style>
  </head>
  <body class="bg-emerald-50/30 dark:bg-slate-950 text-slate-800 dark:text-slate-200 antialiased overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
